<script>
(function() {
  const lightbox = document.getElementById('media-lightbox');
  const lightboxImage = document.getElementById('media-lightbox-image');
  const lightboxVideo = document.getElementById('media-lightbox-video');
  const lightboxProduction = document.getElementById('media-lightbox-production');
  const lightboxCounter = document.getElementById('media-lightbox-counter');
  const closeBtn = document.querySelector('.media-lightbox-close');
  const prevBtn = document.querySelector('.media-lightbox-prev');
  const nextBtn = document.querySelector('.media-lightbox-next');
  const backdrop = document.querySelector('.media-lightbox-backdrop');
  
  let allMedia = [];
  let currentIndex = 0;
  
  // Collect all media (images and videos)
  function collectMedia() {
    allMedia = [];
    const wrappers = document.querySelectorAll('.media-image-wrapper');
    wrappers.forEach((wrapper) => {
      // Skip videos that should play inline (full-width videos in separate sections)
      const style = wrapper.getAttribute('style') || '';
      const isFullWidthVideo = wrapper.classList.contains('media-video-wrapper') && 
                               style.includes('grid-column: 1 / -1');
      
      if (isFullWidthVideo) {
        return; // Skip these videos from lightbox
      }
      
      const videoType = wrapper.getAttribute('data-video-type');
      const videoId = wrapper.getAttribute('data-video-id');
      const videoUrl = wrapper.getAttribute('data-video-url');
      
      if (videoType) {
        // It's a video
        let embedUrl = '';
        if (videoType === 'youtube' && videoId) {
          embedUrl = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
        } else if (videoType === 'soundcloud' && videoUrl) {
          embedUrl = videoUrl;
        }
        allMedia.push({
          type: 'video',
          embedUrl: embedUrl,
          production: wrapper.getAttribute('data-production') || 'Video & Audio',
          element: wrapper
        });
      } else {
        // It's an image
        allMedia.push({
          type: 'image',
          src: wrapper.getAttribute('data-full-image'),
          production: wrapper.getAttribute('data-production'),
          element: wrapper
        });
      }
    });
  }
  
  // Replace video thumbnail with player (for inline videos)
  function replaceThumbnailWithPlayer(wrapper) {
    const videoType = wrapper.getAttribute('data-video-type');
    const videoId = wrapper.getAttribute('data-video-id');
    const videoUrl = wrapper.getAttribute('data-video-url');
    
    // Check if already replaced
    if (wrapper.querySelector('iframe')) {
      return;
    }
    
    if (videoType === 'youtube' && videoId) {
      // Create YouTube iframe
      const iframe = document.createElement('iframe');
      iframe.src = `https://www.youtube.com/embed/${videoId}?autoplay=1`;
      iframe.width = '100%';
      iframe.height = '100%';
      iframe.frameBorder = '0';
      iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
      iframe.allowFullscreen = true;
      iframe.style.position = 'absolute';
      iframe.style.top = '0';
      iframe.style.left = '0';
      iframe.style.width = '100%';
      iframe.style.height = '100%';
      iframe.style.borderRadius = '4px';
      
      // Replace content
      wrapper.innerHTML = '';
      wrapper.appendChild(iframe);
    } else if (videoType === 'soundcloud' && videoUrl) {
      // Create SoundCloud iframe
      const iframe = document.createElement('iframe');
      iframe.src = videoUrl;
      iframe.width = '100%';
      iframe.height = '166';
      iframe.scrolling = 'no';
      iframe.frameBorder = 'no';
      iframe.allow = 'autoplay';
      iframe.style.borderRadius = '4px';
      
      // Replace content
      wrapper.innerHTML = '';
      wrapper.appendChild(iframe);
    }
  }
  
  // Open lightbox
  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    lightbox.style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  
  // Close lightbox
  function closeLightbox() {
    lightbox.style.display = 'none';
    document.body.style.overflow = '';
    // Stop video playback
    if (lightboxVideo.src) {
      lightboxVideo.src = '';
    }
  }
  
  // Update lightbox content
  function updateLightbox() {
    if (allMedia.length === 0) return;
    
    const current = allMedia[currentIndex];
    
    if (current.type === 'video') {
      lightboxImage.style.display = 'none';
      lightboxVideo.style.display = 'block';
      lightboxVideo.src = current.embedUrl;
    } else {
      lightboxVideo.style.display = 'none';
      lightboxImage.style.display = 'block';
      lightboxImage.src = current.src;
    }
    
    lightboxProduction.textContent = current.production;
    lightboxCounter.textContent = `${currentIndex + 1} / ${allMedia.length}`;
    
    // Update nav buttons
    prevBtn.style.display = currentIndex > 0 ? 'flex' : 'none';
    nextBtn.style.display = currentIndex < allMedia.length - 1 ? 'flex' : 'none';
  }
  
  // Navigate
  function goToNext() {
    if (currentIndex < allMedia.length - 1) {
      // Stop current video if playing
      if (lightboxVideo.src) {
        lightboxVideo.src = '';
      }
      currentIndex++;
      updateLightbox();
    }
  }
  
  function goToPrev() {
    if (currentIndex > 0) {
      // Stop current video if playing
      if (lightboxVideo.src) {
        lightboxVideo.src = '';
      }
      currentIndex--;
      updateLightbox();
    }
  }
  
  // Initialize
  collectMedia();
  
  // Add click handlers to media items
  document.querySelectorAll('.media-image-wrapper').forEach((wrapper) => {
    wrapper.addEventListener('click', function(e) {
      // Check if this is a full-width video that should play inline
      const style = wrapper.getAttribute('style') || '';
      const isFullWidthVideo = wrapper.classList.contains('media-video-wrapper') && 
                               style.includes('grid-column: 1 / -1');
      
      if (isFullWidthVideo) {
        // Play inline
        e.preventDefault();
        e.stopPropagation();
        replaceThumbnailWithPlayer(wrapper);
      } else {
        // Open in lightbox
        const actualIndex = allMedia.findIndex(m => m.element === wrapper);
        if (actualIndex !== -1) {
          openLightbox(actualIndex);
        }
      }
    });
  });
  
  // Close handlers
  closeBtn.addEventListener('click', closeLightbox);
  backdrop.addEventListener('click', closeLightbox);
  
  // Navigation handlers
  nextBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    goToNext();
  });
  
  prevBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    goToPrev();
  });
  
  // Keyboard navigation
  document.addEventListener('keydown', function(e) {
    if (lightbox.style.display === 'none' || lightbox.style.display === '') return;
    
    if (e.key === 'Escape') {
      closeLightbox();
    } else if (e.key === 'ArrowRight') {
      goToNext();
    } else if (e.key === 'ArrowLeft') {
      goToPrev();
    }
  });
})();
</script>
